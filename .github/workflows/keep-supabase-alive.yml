name: Keep Supabase Alive

on:
  schedule:
    # 每周一早上 8:00 UTC (北京时间 16:00) 执行
    - cron: '0 8 * * 1'
  workflow_dispatch: # 允许手动触发

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase via API
        run: |
          echo "Pinging souls.design API to keep Supabase active..."
          response=$(curl -s -o /dev/null -w "%{http_code}" https://souls.design/api/test-supabase)
          echo "Response code: $response"
          if [ "$response" = "200" ]; then
            echo "✅ Supabase is alive!"
          else
            echo "⚠️ Unexpected response code: $response"
          fi
